name: daily-dashboard

on:
  schedule:
    # 평일 장마감 후 16:00 KST = 07:00 UTC (일봉 데이터 갱신 직후)
    - cron: '0 7 * * 1-5'
    # 주말 1회 (모니터링용)
    - cron: '0 0 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-dashboard
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run lint

      - name: Generate dashboard
        run: npm start

      - name: Commit docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(dashboard): update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

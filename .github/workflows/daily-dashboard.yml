name: daily-dashboard

on:
  schedule:
    # 23:00 UTC = 08:00 KST (다음 날)
    - cron: '0 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-dashboard
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run dashboard
        env:
          JANDI_WEBHOOK_URL: ${{ secrets.JANDI_WEBHOOK_URL }}
          DASHBOARD_PUBLIC_URL: ${{ vars.DASHBOARD_PUBLIC_URL || 'https://daewon82.github.io/trading/' }}
        run: npm run test:dashboard

      - name: Commit docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(dashboard): daily update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

name: daily-dashboard

on:
  schedule:
    # 장중(09:00-15:55 KST = 00:00-06:55 UTC) 평일 5분 간격
    # GitHub Actions cron은 5~30분 지연 가능 (정시 보장 X)
    - cron: '*/5 0-6 * * 1-5'
    # 장외 평일 1시간 간격 (16:00 KST ~ 다음 08:00 KST = 07:00-23:00 UTC)
    - cron: '0 7-23 * * 1-5'
    # 주말 1시간 간격
    - cron: '0 * * * 0,6'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-dashboard
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run dashboard
        run: npm run test:dashboard

      - name: Prune old history files (keep last 500)
        run: |
          cd docs/history
          ls -t dashboard-*.html 2>/dev/null | tail -n +501 | xargs -r rm
          cd ../..

      - name: Commit docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(dashboard): update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

name: daily-dashboard

on:
  schedule:
    # 평일 장마감 후 16:00 KST = 07:00 UTC (당일 일봉 종가 기준 신호 확정)
    - cron: '0 7 * * 1-5'
    # 평일 시초가 직전 08:30 KST = 23:30 UTC 전일 (다음날 매매 직전 재확인)
    # cron 요일: 일~목 23:30 UTC = 월~금 08:30 KST
    - cron: '30 23 * * 0-4'
    # 주말 1회 (모니터링용)
    - cron: '0 0 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-dashboard
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run lint

      - name: Generate dashboard + notify
        env:
          JANDI_WEBHOOK_URL: ${{ secrets.JANDI_WEBHOOK_URL }}
          DASHBOARD_PUBLIC_URL: ${{ vars.DASHBOARD_PUBLIC_URL || 'https://daewon82.github.io/trading/' }}
        run: npm start

      - name: Commit docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(dashboard): update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
